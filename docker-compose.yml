# TODO: Define your services
#
# Requirements:
# - Service "db": PostgreSQL (postgres:16-alpine)
# - Service "api": your Dockerfile, depends on db
# - api exposes port 8080 on the host
# - Use environment variables from .env for DB credentials
# - Do NOT hardcode passwords in this file
version: "3.9"
services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
   
  
  api:
    build: .
    container_name: fastapi_api
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
volumes:
  db_data:
